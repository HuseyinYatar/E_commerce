services:
  database:
    container_name: postgresql
    image: postgres:16.0
    environment:
      - POSTGRES_USER=${POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB_NAME}
    volumes:
      - ./postgresql:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"
