spring.application.name=PaymentService
server.port=${APP_PORT}


# --- TOPICS ---
FINISH_PAYMENT=finish-payment
FAIL_PAYMENT=fail-payment
START_PAYMENT=start-payment

# --- DB CONFIG ---
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=${POSTGRES_URL}
spring.datasource.username=${POSTGRES_USERNAME}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.kafka.bootstrap-servers=${KAFKA_URL}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


# --- PRODUCER CONFIG ---
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

spring.kafka.producer.properties.spring.json.type.mapping=\
finishedPaymentEvent:org.ecommerce.paymentservice.dto.FinishedPaymentEvent,\
  failedPayment:org.ecommerce.paymentservice.dto.PaymentFailedEvent


# --- CONSUMER CONFIG ---
spring.kafka.consumer.group-id=payment-group-v1
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=\
  org.apache.kafka.common.serialization.StringDeserializer

spring.kafka.consumer.properties.spring.json.type.mapping=\
StartPaymentEvent:org.ecommerce.paymentservice.dto.StartPaymentEvent
spring.kafka.consumer.properties.spring.json.trusted.packages=org.eccommerce.cordinator.dto.*