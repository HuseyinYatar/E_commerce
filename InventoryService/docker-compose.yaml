services:
  db:
    container_name: postgres_InventoryService
    image: postgres:16.0
    environment:
      - POSTGRES_USER=${POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=inventory_service
    volumes:
    - ./postgresql:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"